<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WikiSchool | Archivio</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Stili specifici per l'integrazione del bot nell'archivio */
      #wikibot-wrapper {
        font-family: "Plus Jakarta Sans", sans-serif;
        z-index: 9999;
        position: relative;
      }

      .chatbot-bubble {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 65px;
        height: 65px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
        cursor: pointer;
        z-index: 10000;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      }

      .chatbot-bubble:hover {
        transform: scale(1.1) rotate(5deg);
        box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
      }

      .chatbot-panel {
        position: fixed;
        bottom: 100px;
        right: 25px;
        width: 380px;
        max-width: calc(100vw - 50px);
        height: 600px;
        max-height: calc(100vh - 140px);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 24px;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        z-index: 9999;
        overflow: hidden;
        opacity: 0;
        transform: translateY(30px) scale(0.95);
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        transform-origin: bottom right;
      }

      .chatbot-panel.active {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .chatbot-header {
        padding: 18px 20px;
        background: white;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chatbot-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .msg-bubble {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.5;
        animation: msgFadeIn 0.3s ease;
      }

      .msg-bot { background: #f1f5f9; color: #0f172a; align-self: flex-start; border-bottom-left-radius: 4px; }
      .msg-user { background: #6366f1; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

      .chatbot-input-area {
        padding: 15px;
        background: white;
        border-top: 1px solid #eee;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .chatbot-input-field {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 20px;
        outline: none;
      }

      .chatbot-send-btn {
        background: #6366f1;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }

      .chatbot-preview-area {
        padding: 10px;
        background: #f8fafc;
        display: none;
        align-items: center;
        gap: 10px;
        border-top: 1px solid #eee;
      }

      .chatbot-preview-area.active { display: flex; }

      @keyframes msgFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <nav class="glass-nav">
      <a href="index.html" class="brand">Wiki<span>School</span></a>
      <div class="nav-actions">
        <div id="nav-info" style="font-weight: 600; color: var(--primary)">Archivio Materie</div>
        <a href="index.html" class="nav-link">Home</a>
      </div>
    </nav>

    <div class="container" style="margin-top: 50px">
      <div class="search-container">
        <input type="text" id="search-bar" placeholder="🔍 Cerca tra tutti gli appunti dell'archivio..." />
      </div>

      <button id="back-btn" class="btn-primary" style="display: none; margin-bottom: 20px">
        ← Torna indietro
      </button>

      <div id="gallery" class="masonry-grid"></div>
    </div>

    <!-- Modale Commenti -->
    <div id="comments-modal" class="modal-overlay">
      <div class="modal-content">
        <button id="close-comments" class="close-btn">&times;</button>
        <h3 style="margin-bottom: 15px;">Commenti</h3>
        <div class="comment-wrapper">
          <div id="comments-list" class="comment-list"></div>
          <div class="comment-input-row">
            <input type="text" id="new-comment" placeholder="Scrivi un commento..." />
            <button id="send-comment" class="btn-primary">Invia</button>
          </div>
        </div>
      </div>
    </div>

    <!-- WikiBot UI -->
    <div id="wikibot-wrapper">
      <div id="chatbot-bubble" class="chatbot-bubble">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      </div>

      <div id="chatbot-panel" class="chatbot-panel">
        <div class="chatbot-header">
          <div style="font-weight: 800; color: #0f172a;">Wiki<span style="color: #6366f1;">Bot</span></div>
          <button id="chatbot-close" style="background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        
        <div id="chatbot-messages" class="chatbot-messages">
          <div class="msg-bubble msg-bot">Ciao! Sono WikiBot. Posso aiutarti a trovare appunti o spiegarti concetti difficili. Prova ad allegare una foto!</div>
        </div>

        <div id="chatbot-preview-area" class="chatbot-preview-area">
          <img id="chatbot-preview-img" src="" style="width:40px; height:40px; border-radius:4px; object-fit:cover;">
          <span style="font-size:12px; color:#64748b; flex:1;">Immagine pronta</span>
          <button id="chatbot-remove-img" style="border:none; background:none; color:red; cursor:pointer;">&times;</button>
        </div>

        <div class="chatbot-input-area">
          <input type="file" id="chatbot-file-gallery" accept="image/*" style="display:none;">
          <input type="file" id="chatbot-file-camera" accept="image/*" capture="environment" style="display:none;">
          
          <button id="chatbot-gallery-btn" style="background:none; border:none; cursor:pointer; color:#64748b;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </button>
          
          <input type="text" id="chatbot-text-input" class="chatbot-input-field" placeholder="Scrivi qui...">
          
          <button id="chatbot-send-btn" class="chatbot-send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="script_archivio.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    
    <script>
      // Logica Bot Verificata
      (function() {
        const API_KEY = "AIzaSyDsgUgeYImcqQuAx9kgkecvtwhTN5vKZ64";
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY;

        const bubble = document.getElementById('chatbot-bubble');
        const panel = document.getElementById('chatbot-panel');
        const textInput = document.getElementById('chatbot-text-input');
        const messagesBox = document.getElementById('chatbot-messages');
        const galleryBtn = document.getElementById('chatbot-gallery-btn');
        const fileGallery = document.getElementById('chatbot-file-gallery');

        let currentImageBase64 = null;
        let chatHistory = JSON.parse(sessionStorage.getItem('wikibot_history')) || [];

        // Inizializza UI se c'è cronologia
        if (chatHistory.length > 0) {
          const savedUI = sessionStorage.getItem('wikibot_ui');
          if (savedUI) messagesBox.innerHTML = savedUI;
        }

        bubble.onclick = () => {
          panel.classList.toggle('active');
          messagesBox.scrollTop = messagesBox.scrollHeight;
        };

        document.getElementById('chatbot-close').onclick = () => panel.classList.remove('active');
        galleryBtn.onclick = () => fileGallery.click();

        fileGallery.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              currentImageBase64 = event.target.result.split(',')[1];
              document.getElementById('chatbot-preview-img').src = event.target.result;
              document.getElementById('chatbot-preview-area').classList.add('active');
            };
            reader.readAsDataURL(file);
          }
        };

        document.getElementById('chatbot-remove-img').onclick = () => {
          currentImageBase64 = null;
          document.getElementById('chatbot-preview-area').classList.remove('active');
        };

        async function sendMessage() {
          const text = textInput.value.trim();
          if (!text && !currentImageBase64) return;

          const userMsg = document.createElement('div');
          userMsg.className = 'msg-bubble msg-user';
          userMsg.textContent = text;
          messagesBox.appendChild(userMsg);

          const parts = [];
          if (text) parts.push({ text: text });
          if (currentImageBase64) parts.push({ inlineData: { mimeType: "image/jpeg", data: currentImageBase64 } });
          
          chatHistory.push({ role: "user", parts: parts });
          textInput.value = "";
          document.getElementById('chatbot-remove-img').click();
          messagesBox.scrollTop = messagesBox.scrollHeight;

          try {
            const resp = await fetch(API_URL, {
              method: 'POST',
              body: JSON.stringify({
                systemInstruction: { parts: [{ text: "Sei WikiBot. Rispondi in italiano. Usa LaTeX per la matematica." }] },
                contents: chatHistory
              })
            });
            const data = await resp.json();
            if (data.candidates) {
              const botText = data.candidates[0].content.parts[0].text;
              const botMsg = document.createElement('div');
              botMsg.className = 'msg-bubble msg-bot';
              botMsg.innerHTML = botText.replace(/\n/g, '<br>');
              messagesBox.appendChild(botMsg);
              chatHistory.push({ role: "model", parts: [{ text: botText }] });
              
              // Salva stato
              sessionStorage.setItem('wikibot_history', JSON.stringify(chatHistory));
              sessionStorage.setItem('wikibot_ui', messagesBox.innerHTML);
              
              if (window.MathJax) MathJax.typesetPromise([botMsg]);
            }
          } catch (e) {
            console.error(e);
          }
          messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        document.getElementById('chatbot-send-btn').onclick = sendMessage;
        textInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
      })();
    </script>
  </body>
</html>
