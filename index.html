<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiSchool | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script type="module" src="script.js"></script>
</head>
<body>
    <nav class="glass-nav">
        <a href="index.html" class="brand">Wiki<span>School</span></a>
        <div class="nav-right">
            <a href="archivio.html" class="nav-link">Esplora Archivio →</a>
            <button id="auth-btn" class="btn-primary">Login</button>
        </div>
    </nav>

    <main class="hero" id="main-hero">
        <h1>Digitalizza i tuoi <span>Appunti</span>.</h1>
        <p>Carica, organizza e condividi il tuo materiale scolastico in un click.</p>
        <div class="hero-btns">
            <button id="open-upload" class="btn-primary" style="display:none">Carica Appunti</button>
            <button id="open-profile" class="btn-secondary" style="display:none">Mio Profilo</button>
        </div>
    </main>

    <section id="profile-section" class="container" style="display:none; margin-top:40px;">
        <div class="profile-header">
            <h2 id="user-display-name">Il mio profilo</h2>
            <button id="back-to-hero" class="btn-secondary">← Torna alla Home</button>
        </div>
        <div id="user-files" class="masonry-grid"></div>
    </section>

    <div id="upload-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h3>Carica un nuovo appunto</h3>
            <div class="form-group">
                <input type="text" id="doc-title" placeholder="Titolo dell'appunto (es: Dante Alighieri)">
            </div>
            <div class="form-row">
                <select id="doc-year">
                    <option value="">Seleziona Anno</option>
                    <option value="1">1° Anno</option>
                    <option value="2">2° Anno</option>
                    <option value="3">3° Anno</option>
                    <option value="4">4° Anno</option>
                    <option value="5">5° Anno</option>
                </select>
                <select id="doc-category">
                    <option value="">Seleziona Materia</option>
                    <option value="Italiano">Italiano</option>
                    <option value="Storia">Storia</option>
                    <option value="Geografia">Geografia</option>
                    <option value="Matematica">Matematica</option>
                    <option value="Fisica">Fisica</option>
                    <option value="Scienze">Scienze</option>
                    <option value="Chimica">Chimica</option>
                    <option value="Inglese">Inglese</option>
                    <option value="Lingue">Lingue Straniere</option>
                    <option value="Filosofia">Filosofia</option>
                    <option value="Arte">Storia dell'Arte</option>
                    <option value="Informatica">Informatica</option>
                    <option value="Diritto">Diritto ed Economia</option>
                    <option value="ScienzeUmane">Scienze Umane</option>
                    <option value="EdFisica">Ed. Fisica</option>
                    <option value="Religione">Religione/Alternativa</option>
                </select>
            </div>
            
            <div class="upload-options">
                <button id="upload-widget-btn" class="btn-secondary" style="width:100%">Scegli File (PDF/Immagini)</button>
                <p style="text-align:center; margin:10px 0; font-size:0.8rem; color:var(--text-muted)">OPPURE</p>
                <input type="url" id="doc-link" placeholder="Incolla un link (es: Google Drive, Canva...)" class="input-url">
            </div>

            <button id="publish-btn" class="btn-primary" style="margin-top:20px; width:100%">Pubblica</button>
        </div>
    </div>

    <div id="comment-modal" class="modal-overlay">
        <div class="modal-content comment-box">
            <button class="close-btn">&times;</button>
            <h3>Commenti</h3>
            <div id="comments-list" class="comments-container">
                </div>
            <div class="comment-input-area">
                <input type="text" id="new-comment-text" placeholder="Scrivi un commento...">
                <button id="send-comment" class="btn-primary">Invia</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        </div>

</body>
</html>
