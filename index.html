<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WikiSchool | Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script
      src="https://upload-widget.cloudinary.com/global/all.js"
      type="text/javascript"
    ></script>

    <script type="module" src="script.js"></script>
  </head>
  <body>
    <nav class="glass-nav">
      <a href="index.html" class="brand">Wiki<span>School</span></a>
      <div style="display: flex; gap: 15px; align-items: center">
        <a
          href="archivio.html"
          style="
            text-decoration: none;
            font-weight: 600;
            color: var(--text-main);
          "
          >Esplora Archivio →</a
        >
        <button
          id="auth-btn"
          class="btn-primary"
          style="padding: 8px 16px; width: auto"
        >
          Login
        </button>
      </div>
    </nav>

    <main class="hero">
      <h1>Digitalizza i tuoi <span>Appunti</span>.</h1>
      <p style="color: var(--text-muted); font-size: 1.1rem">
        Condividi e organizza i tuoi progetti scolastici.
      </p>
    </main>

    <div class="container">
      <div
        id="login-prompt"
        style="
          display: none;
          text-align: center;
          padding: 20px;
          background: #fff;
          border-radius: 20px;
          margin-bottom: 20px;
          border: 2px dashed var(--primary);
        "
      >
        <p style="font-weight: 600; color: var(--primary)">
          ⚠️ Accedi o Registrati per poter pubblicare i tuoi appunti
        </p>
      </div>

      <div class="upload-box-pro" id="upload-box">
        <div class="form-group">
          <label>Titolo del Progetto</label>
          <input
            type="text"
            id="title"
            placeholder="Es. La Rivoluzione Francese"
          />
        </div>

        <div class="form-group">
          <label>Anno Scolastico</label>
          <select id="year-selector">
            <option value="" disabled selected>Seleziona l'anno...</option>
            <option value="1">1° Anno</option>
            <option value="2">2° Anno</option>
            <option value="3">3° Anno</option>
            <option value="4">4° Anno</option>
            <option value="5">5° Anno</option>
          </select>
        </div>

        <div class="form-group">
          <label>Materia</label>
          <select id="category-filter">
            <option value="" disabled selected>Seleziona la materia...</option>
            <option value="Italiano">Italiano</option>
            <option value="Latino">Latino</option>
            <option value="Storia">Storia</option>
            <option value="Filosofia">Filosofia</option>
            <option value="Educazione Civica">Educazione Civica</option>
            <option value="Matematica">Matematica</option>
            <option value="Fisica">Fisica</option>
            <option value="Scienze Naturali">Scienze Naturali</option>
            <option value="Informatica">Informatica</option>
            <option value="Disegno e Storia dell'Arte">
              Disegno e Storia dell'Arte
            </option>
            <option value="Inglese">Inglese</option>
            <option value="Francese">Francese</option>
            <option value="Spagnolo">Spagnolo</option>
            <option value="Scienze Umane">Scienze Umane</option>
            <option value="Diritto ed Economia">Diritto ed Economia</option>
            <option value="Scienze Motorie">Scienze Motorie</option>
          </select>
        </div>

        <div class="upload-options">
          <div class="upload-option">
            <label>Carica File (se supera 1MB usare) </label>
            <input type="file" id="file-selector" accept="image/*,.pdf" />
          </div>
          <div class="upload-option">
            <label>Oppure Link</label>
            <input
              type="url"
              id="external-link"
              placeholder="https://drive.google.com/..."
            />
          </div>
        </div>

        <button id="upload-btn" class="btn-primary">Pubblica</button>
        <div
          id="status"
          style="
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            color: var(--primary);
          "
        ></div>
      </div>
    </div>

    <div id="login-modal" class="modal-overlay" style="display: none">
      <div
        class="upload-box-pro modal-content"
        style="max-width: 400px; position: relative"
      >
        <button id="close-modal" class="close-btn">&times;</button>

        <div id="auth-view-login">
          <h2 style="text-align: center; margin-bottom: 20px">Accedi</h2>
          <div class="form-group">
            <label>Email</label
            ><input
              type="email"
              id="login-email"
              placeholder="latua@email.it"
            />
          </div>
          <div class="form-group">
            <label>Password</label
            ><input type="password" id="login-password" placeholder="••••••" />
          </div>
          <button id="do-login" class="btn-primary">Entra</button>
          <p style="text-align: center; margin-top: 15px">
            Nuovo utente?
            <span
              id="go-to-reg"
              style="color: var(--primary); cursor: pointer; font-weight: 700"
              >Registrati qui</span
            >
          </p>
        </div>

        <div id="auth-view-register" style="display: none">
          <h2 style="text-align: center; margin-bottom: 20px">Registrati</h2>
          <div class="form-group">
            <label>Nome</label
            ><input type="text" id="reg-name" placeholder="Il tuo nome" />
          </div>
          <div class="form-group">
            <label>Email</label
            ><input type="email" id="reg-email" placeholder="latua@email.it" />
          </div>
          <div class="form-group">
            <label>Password</label
            ><input
              type="password"
              id="reg-password"
              placeholder="Minimo 6 caratteri"
            />
          </div>
          <button id="do-register" class="btn-primary">Crea Account</button>
          <p style="text-align: center; margin-top: 15px">
            Hai già un account?
            <span
              id="go-to-login"
              style="color: var(--primary); cursor: pointer; font-weight: 700"
              >Accedi</span
            >
          </p>
        </div>

        <div
          style="
            text-align: center;
            margin: 15px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
          "
        >
          OPPURE
        </div>
        <button
          id="google-login"
          class="btn-secondary"
          style="
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: var(--radius);
          "
        >
          <img
            src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg"
            width="20"
          />
          Accedi con Google
        </button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
